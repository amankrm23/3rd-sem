<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Tech Syllabus Tracker</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px;
            color: var(--primary);
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        select {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-weight: bold;
            color: var(--text);
            cursor: pointer;
            outline: none;
        }
        select:focus {
            border-color: var(--primary);
        }
        
        .progress-container {
            width: 60%;
        }
        .progress-bar {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            height: 24px;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-text {
            text-align: right;
            font-size: 14px;
            margin-top: 8px;
            font-weight: bold;
            color: #4b5563;
        }

        .unit-card {
            background: var(--card-bg);
            margin-bottom: 20px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .unit-card h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            font-size: 1.25rem;
            color: #374151;
        }
        .topic-item {
            display: flex;
            align-items: flex-start;
            margin: 12px 0;
            padding: 10px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        .topic-item:hover { 
            background-color: #f9fafb; 
        }
        .topic-item input[type="checkbox"] {
            margin-top: 3px;
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }
        .topic-item label { 
            cursor: pointer; 
            flex-grow: 1; 
            line-height: 1.5;
            font-size: 1.05rem;
        }
        .completed { 
            text-decoration: line-through; 
            color: #9ca3af; 
        }
    </style>
</head>
<body>

    <h1>📚 3rd Semester Syllabus Tracker</h1>

    <div class="controls">
        <select id="subject-selector">
            </select>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text">0% Completed</div>
        </div>
    </div>

    <div id="syllabus-container">
        </div>

    <script>
        // 1. THE COMPLETE MASTER DATABASE
        const syllabusData = {
            "DATA_STRUCTURES_AND_ALGORITHMS": [
                {
                    "unit": "Unit 1: REFRESHER OF DATA STRUCTURES",
                    "topics": [
                        "Abstract Data Types and Data Structures - Principles, and Patterns",
                        "Basic complexity analysis – Best, Worst, and Average Cases",
                        "Asymptotic Analysis - Analyzing Programs – Space Bounds",
                        "Recursion: linear, binary, and multiple recursions",
                        "Sorting and Selection – Linear Sorting",
                        "Divide and Conquer based sorting – Analysis using Recurrence Tree based Method",
                        "Merge Sort and Quick Sort",
                        "Studying Sorting through an Algorithmic Lens",
                        "Arrays, Linked Lists and Recursion: Using Arrays - Lists - Array based List Implementation",
                        "Linked Lists – LL ADT – Singly Linked List – Doubly Linked List – Circular Linked List",
                        "Stacks and Queues: Stack ADT - Array based Stacks, Linked Stacks",
                        "Implementing Recursion using Stacks, Stack Applications",
                        "Queues - ADT, Array based Queue, Linked Queue, Double-ended queue, Circular queue, applications"
                    ]
                },
                {
                    "unit": "Unit 2: TREES",
                    "topics": [
                        "Tree Definition and Properties – Tree ADT - Basic tree traversals",
                        "Binary tree - Data structure for representing trees",
                        "Linked Structure for Binary Tree – Array based implementation",
                        "Priority queues: ADT – Implementing Priority Queue using List – Heaps",
                        "Maps and Dictionaries: Map ADT – List based Implementation",
                        "Hash Tables - Dictionary ADT",
                        "Skip Lists - Implementation - Complexity"
                    ]
                },
                {
                    "unit": "Unit 3: SEARCH TREES AND GRAPHS",
                    "topics": [
                        "Binary search tree, AVL tree",
                        "Trees – Segment Trees - B-Trees",
                        "Implementation of Search Trees",
                        "External Memory Sorting and Searching",
                        "Graphs: ADT - Data structure for graphs - Graph traversal",
                        "Transitive Closure - Directed Acyclic graphs",
                        "Weighted graphs – Shortest Paths",
                        "Minimum spanning tree – Greedy Methods for MST"
                    ]
                }
            ],
            "DBMS": [
                {
                    "unit": "Unit 1: Introduction, Relational Model & Database Design",
                    "topics": [
                        "Overview of DBMS fundamentals, Relational Databases and Keys",
                        "Structure of relational databases & Database schema",
                        "Formal Relational Query Languages & Relational Algebra",
                        "Database Design process & The E-R Models",
                        "Constraints, E-R Diagrams, Reduction to Relational Schemas",
                        "Entity Relationship Design Issues, Extended E-R Features & UML"
                    ]
                },
                {
                    "unit": "Unit 2: Relational Database Design & SQL",
                    "topics": [
                        "Features of Good Relational Designs, Atomic Domains and 1NF",
                        "Decomposition using Functional Dependencies: 2NF, 3NF, BCNF & Higher Normal Forms",
                        "Functional Dependency Theory & Algorithm for Decomposition",
                        "Decomposition using multi-valued dependency: 4NF",
                        "Database design process and its issues",
                        "SQL: review of SQL, Intermediate SQL, Advanced SQL"
                    ]
                },
                {
                    "unit": "Unit 3: Transactions, Concurrency Control & NoSQL",
                    "topics": [
                        "Transaction concept, atomicity, durability, and isolation",
                        "Serializability, Recoverable and Cascadeless schedules",
                        "Concurrency control: Lock-based protocols, Two-phase locking",
                        "Implementation of locking and Graph-based protocols",
                        "Deadlock handling: prevention, detection, and recovery",
                        "Case Study: High-level databases (MongoDB, Hadoop, Redis, Cassandra, etc.)",
                        "Tips for choosing the right database"
                    ]
                }
            ],
            "DIGITAL_ELECTRONICS_AND_SYSTEMS": [
                {
                    "unit": "Unit 1: INTRODUCTION TO LOGIC CIRCUITS",
                    "topics": [
                        "Variables and functions, inversion, Truth tables",
                        "Logic gates and Networks, Boolean algebra",
                        "Synthesis using gates, Design examples",
                        "Optimized implementation of logic functions: Karnaugh map",
                        "Strategy for minimization, Minimization of product of sums forms",
                        "Incompletely specified functions, Multiple output circuits",
                        "Tabular method for minimization",
                        "Number representation and arithmetic circuits",
                        "Addition of unsigned numbers, Signed numbers, Fast adders"
                    ]
                },
                {
                    "unit": "Unit 2: COMBINATIONAL & SEQUENTIAL CIRCUIT BUILDING BLOCKS",
                    "topics": [
                        "Multiplexers, Decoders, Encoders",
                        "Code converters, Arithmetic comparison circuits",
                        "Sequential circuit building blocks: Basic latch",
                        "Gated SR latch, Gated D latch",
                        "Master slave and edge triggered flip-flops",
                        "D flip-flops, T flip-flop, JK flip-flop",
                        "Registers, Counters, Reset synchronization"
                    ]
                },
                {
                    "unit": "Unit 3: SYNCHRONOUS SEQUENTIAL CIRCUITS",
                    "topics": [
                        "Basic design steps, State assignment problem",
                        "Mealy state model, Serial adders",
                        "State minimization",
                        "Introduction to Asynchronous sequential circuits",
                        "Introduction to CMOS logic"
                    ]
                }
            ],
            "PROBABILITY_AND_STATISTICS": [
                {
                    "unit": "Unit 1: Random variables and their distributions",
                    "topics": [
                        "Introduction to Probability, random variables (discrete and continuous)",
                        "Probability functions, density and distribution functions",
                        "Mean and variance",
                        "Special distributions (Binomial, Hyper geometric, Poisson, Uniform, exponential and normal)",
                        "Chebyshev's inequality, parameter and statistic",
                        "Estimation of parameters by maximum Likelihood Estimation method"
                    ]
                },
                {
                    "unit": "Unit 2: Testing of Hypothesis",
                    "topics": [
                        "Testing of Hypothesis, Null and alternative hypothesis, level of significance",
                        "One-tailed and two-tailed tests",
                        "Tests for large samples (single mean, difference of means, single proportion, difference of proportions)",
                        "Tests for small samples (t-test for single mean and difference of means, F-test for comparison of variances)",
                        "Chi-square test for goodness of fit",
                        "Analysis of variance (one way classification with samples of equal and unequal sizes)",
                        "Karl Pearson coefficient of correlation, lines of regression"
                    ]
                },
                {
                    "unit": "Unit 3: Queuing theory",
                    "topics": [
                        "Concepts, applicability, classification, birth and death process",
                        "Poisson queues, Characteristics of queuing models",
                        "Single server (with finite and infinite capacities) model",
                        "Multiple server (with infinite capacity only) model"
                    ]
                }
            ],
            "OOPS_WITH_JAVA": [
                {
                    "unit": "Unit 1: Core OOPs, Inheritance & Exception Handling",
                    "topics": [
                        "Object Oriented Thinking, History of Java & OOPs Concepts",
                        "Understanding Inheritance, Base Class, Subclass & Substitutability",
                        "Forms of Inheritance, Modifiers, Final, 'this' & 'super' keywords",
                        "Method Overriding, Dynamic Method Dispatch & Abstract Classes",
                        "The Object Class, Packages, Access Protection & Importing",
                        "Implementing & Extending Interfaces",
                        "Exception Handling: Checked/Unchecked, Try/Catch, Throw, Throws, Finally & User Defined Exceptions"
                    ]
                },
                {
                    "unit": "Unit 2: Multithreading, Strings, I/O & Networking",
                    "topics": [
                        "Multi-Threading: Thread Model, Priorities, Synchronization & Thread Creation",
                        "Thread Methods: isAlive(), join(), wait() & notify()",
                        "String Handling: Constructors, Extraction, Comparison & Modifying",
                        "Java I/O: Stream Classes, Byte/Character Streams & Serialization",
                        "JDBC: Fundamentals & Driver Types (I, II, III, IV)",
                        "Networking: Basics, Sockets, TCP/IP Client/Server Sockets & URL Format"
                    ]
                },
                {
                    "unit": "Unit 3: Polymorphism, Applets, Event Handling & GUI",
                    "topics": [
                        "Polymorphism: Overloading, Overriding, Abstract Methods & Pure Polymorphism",
                        "Applets: Basics, Architecture, HTML APPLET Tag & Passing Parameters",
                        "Event Handling: Delegation Event Model, Listeners & Adapter Classes",
                        "AWT: Class Hierarchy, Layout Managers, Containers, Frame, Canvas & Graphics",
                        "Swing & Core Java API: Icons, Labels, Text Fields, Buttons, Tables & Trees",
                        "Exploring Java Language: Type Wrappers, Runtime Memory Management, Reflection & Cloneable Interface"
                    ]
                }
            ],
            "PROFESSIONAL_PRACTICE": [
                {
                    "unit": "Unit 1: Résumé & Interview Skills",
                    "topics": [
                        "Résumé vs CV vs Biodata & Essential Components",
                        "Common Errors & Guidelines for Résumé Preparation",
                        "Types of Interviews & The STAR Approach",
                        "Interview Procedure: Do's, Don'ts & Common Errors",
                        "Important Job Interview Questions & Assessing Strengths",
                        "Job Simulation Formats & Mock Interviews"
                    ]
                },
                {
                    "unit": "Unit 2: Group Discussion & Career Exploration",
                    "topics": [
                        "Group Discussion: Types, Methodology & Ground Rules",
                        "Stages of Group Formation & Evaluation Criteria",
                        "Common Errors in Group Discussions",
                        "Process of Career Exploration & Self-Assessment",
                        "Sources of Career Information & Exploring the World of Work"
                    ]
                },
                {
                    "unit": "Unit 3: Cognitive & Non-Cognitive Skills",
                    "topics": [
                        "Cognitive Skills: Critical Thinking & Problem-Solving",
                        "The Ability to Learn & Cognitive Training Strategies",
                        "Non-Cognitive Skills: Empathy, Teamwork & Creativity",
                        "Collaboration, Resilience & Interpersonal Skills",
                        "Perseverance, Self-Control & Social Skills",
                        "Managing Peer Pressure & Stress Management"
                    ]
                },
                {
                    "unit": "Unit 4: Presentation Skills, Trust & Collaboration",
                    "topics": [
                        "Types of Presentations (Informative vs Persuasive)",
                        "Presentation Strategies: Audience, Tools & Delivery",
                        "Importance of Trust in Collaborative Teams",
                        "Strategies to Build Trust with Employees",
                        "Understanding Social Anxiety & Overcoming Fear of Judgement",
                        "Consensus Decision Making (Agree to Disagree)"
                    ]
                },
                {
                    "unit": "Unit 5: Listening, Brainstorming & Workplace Etiquette",
                    "topics": [
                        "Listening as a Team Skill: Types & Advantages",
                        "Active Listening Strategies & Encouraging Idea Sharing",
                        "Brainstorming: Rules, Process & Types (Individual vs Group)",
                        "Principles of Documenting Team Session Outcomes",
                        "Social, Cultural & Corporate/Professional Etiquette",
                        "Internal Communication: Channels, Needs & Digital Tools"
                    ]
                }
            ]
        };

        // 2. STATE MANAGEMENT
        const subjectSelector = document.getElementById('subject-selector');
        const container = document.getElementById('syllabus-container');
        
        // Load saved progress from Browser Memory (LocalStorage)
        let userProgress = JSON.parse(localStorage.getItem('mySyllabusProgressTracker')) || {};

        // 3. INITIALIZATION
        function init() {
            // Populate the dropdown menu dynamically based on the master database
            for (let subject in syllabusData) {
                let option = document.createElement('option');
                option.value = subject;
                // Replace underscores with spaces for a cleaner look in the dropdown
                option.textContent = subject.replace(/_/g, ' ');
                subjectSelector.appendChild(option);
            }

            // Listen for dropdown changes
            subjectSelector.addEventListener('change', (e) => renderSyllabus(e.target.value));

            // Render the first subject by default on page load
            renderSyllabus(subjectSelector.value);
        }

        // 4. RENDER FUNCTION
        function renderSyllabus(subjectKey) {
            const units = syllabusData[subjectKey];
            container.innerHTML = ''; // Clear previous subject from the screen

            let totalTopics = 0;
            let completedTopics = 0;

            units.forEach((unit, unitIndex) => {
                const card = document.createElement('div');
                card.className = 'unit-card';
                
                const title = document.createElement('h2');
                title.textContent = unit.unit;
                card.appendChild(title);

                unit.topics.forEach((topic, topicIndex) => {
                    totalTopics++;
                    
                    // UNIQUE ID CREATION: This is what stops subjects from overwriting each other.
                    // Example ID generated: "DBMS_0_1" or "DSA_2_4"
                    const uniqueTopicId = `${subjectKey}_${unitIndex}_${topicIndex}`;
                    
                    // Check if this specific ID is saved as "true" in LocalStorage
                    const isChecked = userProgress[uniqueTopicId] === true;
                    if (isChecked) completedTopics++;

                    const topicDiv = document.createElement('div');
                    topicDiv.className = 'topic-item';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = uniqueTopicId;
                    checkbox.checked = isChecked;
                    
                    const label = document.createElement('label');
                    label.htmlFor = uniqueTopicId;
                    label.textContent = topic;
                    if (isChecked) label.classList.add('completed');

                    // Event Listener: What happens when you click a box
                    checkbox.addEventListener('change', (e) => {
                        // 1. Update the JavaScript object
                        userProgress[uniqueTopicId] = e.target.checked;
                        
                        // 2. Save the updated object to the browser
                        localStorage.setItem('mySyllabusProgressTracker', JSON.stringify(userProgress));
                        
                        // 3. Re-render the UI to update the progress bar and strikethroughs
                        renderSyllabus(subjectKey); 
                    });

                    topicDiv.appendChild(checkbox);
                    topicDiv.appendChild(label);
                    card.appendChild(topicDiv);
                });

                container.appendChild(card);
            });

            // Update the progress bar at the top
            updateProgressBar(completedTopics, totalTopics);
        }

        // 5. PROGRESS BAR FUNCTION
        function updateProgressBar(completed, total) {
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            document.getElementById('progress-fill').style.width = `${percentage}%`;
            document.getElementById('progress-text').textContent = `${percentage}% Completed (${completed}/${total})`;
        }

        // Start the application
        init();
    </script>
</body>
</html>
